<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Nookly — Find Your Perfect PG</title>
  <base href="/">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Nookly — Discover verified PG accommodations, hostels and rental rooms near you. No brokerage. No hassle.">
  <meta name="theme-color" content="#2C3E50">

  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=DM+Serif+Display:ital@0;1&family=Jost:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Jost', 'Segoe UI', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #F4F7FB;
      color: #2C3E50;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #4A90E2, #C9A96E);
      border-radius: 9999px;
    }

    ::selection {
      background: rgba(74, 144, 226, 0.18);
      color: #2C3E50;
    }

    app-root:empty::before {
      content: '';
      display: block;
      position: fixed;
      inset: 0;
      background: #F4F7FB;
      z-index: 9999;
    }
  </style>

</head>

<body class="mat-typography">
  <app-root></app-root>
</body>

</html>
